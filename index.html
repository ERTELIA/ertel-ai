<body>
<div id="app"></div>

<script>
/* ============ PONTE PARA O BANCO DE DADOS (Neon via /api/storage) ============
   Fora do Claude, window.storage não existe. Este bloco recria a mesma
   assinatura (get/set/delete/list) usada em todo o app:
   - shared=false (dado pessoal, ex: "lembrar login") -> fica no navegador (localStorage)
   - shared=true  (dado da empresa, ex: produtos/retiradas) -> vai para a API -> Neon
*/
window.storage = {
  async _readErr(r){
    try{ const j = await r.json(); return j.error || r.statusText || ('HTTP '+r.status); }
    catch(e){ return r.statusText || ('HTTP '+r.status); }
  },
  async get(key, shared){
    if(!shared){
      const v = localStorage.getItem(key);
      if(v===null) throw new Error('not found');
      return {key, value:v, shared:false};
    }
    const r = await fetch('/api/storage?key='+encodeURIComponent(key));
    if(r.status===404) throw new Error('not found');
    if(!r.ok) throw new Error(await this._readErr(r));
    const data = await r.json();
    return {key:data.key, value:data.value, shared:true};
  },
  async set(key, value, shared){
    if(!shared){ localStorage.setItem(key, value); return {key, value, shared:false}; }
    const r = await fetch('/api/storage', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({key, value})
    });
    if(!r.ok) throw new Error(await this._readErr(r));
    const data = await r.json();
    return {key:data.key, value:data.value, shared:true};
  },
  async delete(key, shared){
    if(!shared){ localStorage.removeItem(key); return {key, deleted:true, shared:false}; }
    const r = await fetch('/api/storage?key='+encodeURIComponent(key), {method:'DELETE'});
    if(!r.ok) throw new Error(await this._readErr(r));
    return {key, deleted:true, shared:true};
  },
  async list(prefix, shared){
    if(!shared){
      const keys = Object.keys(localStorage).filter(k=>k.startsWith(prefix||''));
      return {keys, prefix, shared:false};
    }
    const r = await fetch('/api/storage?prefix='+encodeURIComponent(prefix||''));
    if(!r.ok) throw new Error(await this._readErr(r));
    const data = await r.json();
    return {keys:data.keys, prefix, shared:true};
  }
};

/* ============ STORAGE HELPERS ============ */
const KEYS = { produtos:'ertel:produtos', retiradas:'ertel:retiradas', centros:'ertel:centros', usuarios:'ertel:usuarios', config:'ertel:config', produtosLub:'ertel:produtosLub', retiradasLub:'ertel:retiradasLub', ativos:'ertel:ativos' };

let dbOffline = false;
function showDbErrorBanner(msg){
  dbOffline = true;
  let b = document.getElementById('dbErrorBanner');
  if(!b){
    b = document.createElement('div');
    b.id = 'dbErrorBanner';
    b.style.cssText = 'position:fixed;top:0;left:0;right:0;background:#B33F3F;color:#fff;padding:10px 14px;font-size:12.5px;z-index:999;text-align:center;font-family:sans-serif;';
    document.body.prepend(b);
  }
  b.textContent = '⚠️ Sem conexão com o banco de dados — os dados NÃO estão sendo salvos. Detalhe: ' + msg;
}
function clearDbErrorBanner(){
  dbOffline = false;
  const b = document.getElementById('dbErrorBanner');
  if(b) b.remove();
}

async function loadAll(key, fallback){
  try{
    const timeout = new Promise((_,rej)=>setTimeout(()=>rej(new Error('timeout ao contatar /api/storage')), 8000));
    const r = await Promise.race([window.storage.get(key, true), timeout]);
    clearDbErrorBanner();
    return r && r.value ? JSON.parse(r.value) : fallback;
  }catch(e){
    if(String(e.message||e).includes('not found')){ clearDbErrorBanner(); }
    else { showDbErrorBanner(String(e.message||e)); }
    return fallback;
  }
}
async function saveAll(key, value){
  try{
    await window.storage.set(key, JSON.stringify(value), true);
    clearDbErrorBanner();
  }catch(e){
    console.error('storage error', e);
    showDbErrorBanner(String(e.message||e));
    toast('Erro ao salvar no banco — os dados não foram gravados. Veja o aviso no topo da tela.');
  }
}

let DB = { produtos:[], retiradas:[], centros:[], usuarios:[], config:{whatsappResumo:''}, produtosLub:[], retiradasLub:[], ativos:[] };
let currentUser = null; // {id, nome, perfil}
let currentView = 'dashboard';
let scanStream = null;
let moduloAtivo = null; // 'mro' | 'lub'

function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function money(v){ return (v||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'}); }
function today(){ return new Date(); }
function sameMonth(d, ref){ const a=new Date(d); return a.getMonth()===ref.getMonth() && a.getFullYear()===ref.getFullYear(); }

async function bootstrap(){
  DB.produtos = await loadAll(KEYS.produtos, []);
  DB.retiradas = await loadAll(KEYS.retiradas, []);
  DB.centros = await loadAll(KEYS.centros, []);
  DB.usuarios = await loadAll(KEYS.usuarios, []);
  DB.config = await loadAll(KEYS.config, {whatsappResumo:''});
  DB.produtosLub = await loadAll(KEYS.produtosLub, []);
  DB.retiradasLub = await loadAll(KEYS.retiradasLub, []);
  DB.ativos = await loadAll(KEYS.ativos, []);
  if(!DB.usuarios.some(u=>u.master===true)){
    DB.usuarios.push({id:uid(), nome:'Administrador Master', login:'1234', senha:'1234', perfil:'admin', master:true, ativo:true});
    await saveAll(KEYS.usuarios, DB.usuarios);
  }
  try{
    const savedId = localStorage.getItem('ertel:session');
    if(savedId){
      const u = DB.usuarios.find(x=>x.id===savedId && x.ativo!==false);
      if(u){ currentUser = {id:u.id, nome:u.nome, perfil:u.perfil}; }
      else { localStorage.removeItem('ertel:session'); }
    }
  }catch(e){}
  render();
}
function isMaster(){
  const u = DB.usuarios.find(x=>x.id===(currentUser&&currentUser.id));
  return !!(u && u.master===true);
}
function isAdminLevel(){
  const u = DB.usuarios.find(x=>x.id===(currentUser&&currentUser.id));
  return !!(u && (u.master===true || u.adminLevel===true));
}
function roleLabel(){
  const u = DB.usuarios.find(x=>x.id===(currentUser&&currentUser.id));
  if(u && u.master) return 'master';
  if(u && u.adminLevel) return 'adm';
  return 'usuário';
}

}

/* ============ ROOT RENDER ============ */
function render(){
  const app = document.getElementById('app');
  if(!currentUser){ app.innerHTML = loginScreen(); attachLoginEvents(); return; }
  if(!moduloAtivo){
    const uAtual = DB.usuarios.find(x=>x.id===currentUser.id);
    const podeMro = usuarioTemAcessoModulo(uAtual, 'mro');
    const podeLub = usuarioTemAcessoModulo(uAtual, 'lub');
    const podeAtivos = usuarioTemAcessoModulo(uAtual, 'ativos');
    if(!uAtual || !uAtual.master){
      const permitidos = [podeMro&&'mro', podeLub&&'lub', podeAtivos&&'ativos'].filter(Boolean);
      if(permitidos.length===1){ moduloAtivo=permitidos[0]; resetModuleUiState(); }
    }
  }
  if(!moduloAtivo){ app.innerHTML = moduloSelectorScreen(); attachModuloSelectorEvents(); return; }
  const uAtualTop = DB.usuarios.find(x=>x.id===currentUser.id);
  const modulosDoUsuario = uAtualTop && uAtualTop.master ? ['mro','lub','ativos'] : ['mro','lub','ativos'].filter(m=>usuarioTemAcessoModulo(uAtualTop, m));
  const temMaisDeUmModulo = modulosDoUsuario.length > 1;
  const rotulo = moduloAtivo==='lub' ? 'Sala de Lubrificantes' : (moduloAtivo==='ativos' ? 'Cadastro de Ativos' : 'Estoque MRO');
  const rotuloProdutos = moduloAtivo==='lub' ? 'Óleos' : 'Produtos';
  const navButtons = moduloAtivo==='ativos'
    ? `<button data-v="dashboard"><span>${ICONS.home}</span>Início</button>
       <button data-v="produtos"><span>${ICONS.box}</span>Ativos</button>
       <button data-v="mais"><span>${ICONS.more}</span>Mais</button>`
    : `<button data-v="dashboard"><span>${ICONS.home}</span>Início</button>
       <button data-v="produtos"><span>${ICONS.box}</span>${rotuloProdutos}</button>
       <button data-v="retirada"><span>${ICONS.out}</span>Retirar</button>
       <button data-v="historico"><span>${ICONS.hist}</span>Histórico</button>
       <button data-v="mais"><span>${ICONS.more}</span>Mais</button>`;
  app.innerHTML = `
    <div class="topbar">
      <div class="brand"><span class="tag"></span>ERTEL</div>
      <div class="sub">${rotulo}${temMaisDeUmModulo?` · <button class="link-btn" id="trocarModuloBtn" style="color:inherit;opacity:.85">trocar módulo</button>`:''}</div>
      <div class="userchip" id="logoutBtn">${currentUser.nome}<br>(${roleLabel()}) · sair</div>
    </div>
    <div class="view" id="viewArea"></div>
    <div class="nav">
      ${navButtons}
    </div>
  `;
  document.getElementById('logoutBtn').onclick = ()=>{ currentUser=null; moduloAtivo=null; try{localStorage.removeItem('ertel:session');}catch(e){} render(); };
  const trocarBtn = document.getElementById('trocarModuloBtn');
  if(trocarBtn) trocarBtn.onclick = (e)=>{ e.stopPropagation(); moduloAtivo=null; currentView='dashboard'; render(); };
  document.querySelectorAll('.nav button').forEach(b=>{
    b.onclick = ()=>{ currentView=b.dataset.v; render(); };
    if(b.dataset.v===currentView) b.classList.add('active');
  });
  renderView();
}

function usuarioTemAcessoModulo(u, modulo){
  if(!u) return false;
  if(u.master) return true;
  if(!u.modulos || !Array.isArray(u.modulos)) return true; // usuários antigos sem essa config: mantém acesso a tudo
  return u.modulos.includes(modulo);
}

  maisTab='centros'; invItens=[]; invProdutoAtual=null; invBusca=''; invNotFound=false;

function attachModuloSelectorEvents(){
  document.querySelectorAll('.modSelCard').forEach(el=>{
    el.onclick = ()=>{ moduloAtivo = el.dataset.mod; currentView='dashboard'; resetModuleUiState(); render(); };
  });

function renderView(){
  const el = document.getElementById('viewArea');
  if(moduloAtivo==='ativos'){
    if(currentView==='dashboard') el.innerHTML = ativosDashboardView();
    else if(currentView==='produtos') { el.innerHTML = ativosListView(); attachAtivosEvents(); return; }
    else if(currentView==='mais') { el.innerHTML = ativosMaisView(); attachAtivosMaisEvents(); attachCommonEvents(); return; }
    attachCommonEvents();
    return;
  }
  if(currentView==='dashboard') el.innerHTML = dashboardView();
  else if(currentView==='produtos') { el.innerHTML = produtosView(); attachProdutosEvents(); return; }
  else if(currentView==='retirada') { el.innerHTML = retiradaView(); attachRetiradaEvents(); return; }

/* ============ CADASTRO DE ATIVOS ============ */
const TIPOS_ATIVO = ['Máquina','Motor','Redutor','Bomba','Esteira','Compressor','Painel Elétrico','Outro'];
const CRITICIDADES = [{v:'A',l:'A — Alta'},{v:'B',l:'B — Média'},{v:'C',l:'C — Baixa'}];
const CAMPOS_COMPLETUDE_ATIVO = ['codigo','nome','tipo','fabricante','modelo','numeroSerie','placaIdentificacao','localizacao','criticidade','foto'];
const QUICK_NA = ['Não se aplica','Sem informação'];
const QUICK_PLACA = ['Sem placa de identificação','Placa ilegível'];

function ativoCompletudePct(a){
  let preenchidos = 0;
  CAMPOS_COMPLETUDE_ATIVO.forEach(f=>{ if(a[f] && String(a[f]).trim()!=='') preenchidos++; });
  return Math.round((preenchidos/CAMPOS_COMPLETUDE_ATIVO.length)*100);
}

function ativosDashboardView(){
  const ativos = DB.ativos.filter(a=>a.ativo!==false);
  const total = ativos.length;
  const critCount = {A:0,B:0,C:0,'':0};
  ativos.forEach(a=>{ critCount[a.criticidade||'']++; });
  const classificados = total - critCount[''];
  const pct = (n)=> total>0 ? Math.round((n/total)*100) : 0;
  const mediaCompletude = total>0 ? Math.round(ativos.reduce((s,a)=>s+ativoCompletudePct(a),0)/total) : 0;
  const completos = ativos.filter(a=>ativoCompletudePct(a)===100).length;

  let html = `<h2 class="section-title">Painel — Ativos</h2>`;
  html += `<div class="metrics">
    <div class="metric"><div class="val">${total}</div><div class="lbl">Ativos cadastrados</div></div>
    <div class="metric amber"><div class="val">${mediaCompletude}%</div><div class="lbl">Preenchimento médio</div></div>
  </div>`;

  html += `<h2 class="section-title">Criticidade ABC</h2><div class="card">
    <div style="display:flex;justify-content:space-between;padding:6px 0"><span><span class="pill A">A</span> Alta</span><span class="qtd" style="font-family:var(--font-mono)">${critCount.A} (${pct(critCount.A)}%)</span></div>
    <div style="display:flex;justify-content:space-between;padding:6px 0;border-top:1px solid var(--paper-2)"><span><span class="pill B">B</span> Média</span><span class="qtd" style="font-family:var(--font-mono)">${critCount.B} (${pct(critCount.B)}%)</span></div>
    <div style="display:flex;justify-content:space-between;padding:6px 0;border-top:1px solid var(--paper-2)"><span><span class="pill C">C</span> Baixa</span><span class="qtd" style="font-family:var(--font-mono)">${critCount.C} (${pct(critCount.C)}%)</span></div>
    <div style="display:flex;justify-content:space-between;padding:6px 0;border-top:1px solid var(--paper-2)"><span>Não classificado</span><span class="qtd" style="font-family:var(--font-mono)">${critCount['']} (${pct(critCount[''])}%)</span></div>
  </div>`;

  html += `<h2 class="section-title">Completude do Cadastro</h2><div class="card">
    <div class="note">Cadastros 100% completos: <b>${completos}</b> de ${total}</div>
  </div>`;

  return html;
}

let ativoSearch = '';
let editingAtivo = null;
let showAtivoForm = false;
let pendingFotoAtivoDataUrl = '';
let mostrarInativosAtivos = false;

function ativosListView(){
  const isAdmin = isAdminLevel();
  const list = DB.ativos.filter(a=>(mostrarInativosAtivos || a.ativo!==false) && ((a.nome||'').toLowerCase().includes(ativoSearch.toLowerCase()) || (a.codigo||'').toLowerCase().includes(ativoSearch.toLowerCase())));

  let html = `<h2 class="section-title">Ativos</h2>`;
  html += `<div class="search"><input id="ativoSearchInput" placeholder="Buscar por código ou nome" value="${ativoSearch}">

  </div>`;
  if(isAdmin){
    html += `<label class="remember" style="color:var(--muted);margin-bottom:12px"><input type="checkbox" id="mostrarInativosAtivosChk" ${mostrarInativosAtivos?'checked':''}> Mostrar ativos desativados</label>`;
  }

  if(list.length===0){ html += `<div class="empty"><div class="icon">⚙️</div>Nenhum ativo encontrado.</div>`; }
  list.forEach(a=>{
    const pct = ativoCompletudePct(a);
    html += `<div class="tag-card" data-aid="${a.id}">
      <div class="inner">
        <div class="row1" style="align-items:center">

          </div>
          ${a.criticidade?`<span class="pill ${a.criticidade}">${a.criticidade}</span>`:''}
        </div>
        <div class="desc">${a.nome||'(sem nome)'}${a.ativo===false?' <span class="pill C">inativo</span>':''}</div>
        <div class="meta"><span>${a.tipo||'—'}</span><span>${pct}% preenchido</span></div>
        ${a.localizacao?`<div class="meta" style="margin-top:2px"><span>📍 ${a.localizacao}</span><span></span></div>`:''}
        ${isAdmin?`<div class="row-2" style="margin-top:10px">
          <button class="btn btn-ghost btn-sm editAtivo" data-id="${a.id}">Editar</button>
        </div>`:''}
      </div>
    </div>`;
  });

  if(showAtivoForm && isAdmin) html += ativoFormSheet();
  return html;

  if(newBtn) newBtn.onclick = ()=>{ editingAtivo=null; pendingFotoAtivoDataUrl=''; showAtivoForm=true; renderView(); };

  document.querySelectorAll('.editAtivo').forEach(b=>{
    b.onclick = ()=>{ editingAtivo = DB.ativos.find(a=>a.id===b.dataset.id); pendingFotoAtivoDataUrl=''; showAtivoForm=true; renderView(); };
  });

  const closeBtn = document.getElementById('closeAtivoForm');
  if(closeBtn) closeBtn.onclick = ()=>{ showAtivoForm=false; pendingFotoAtivoDataUrl=''; renderView(); };

  document.querySelectorAll('.quickFillBtn').forEach(b=>{
    b.onclick = ()=>{ const f = document.getElementById(b.dataset.field); if(f) f.value = b.dataset.value; };
  });

  const fotoInput = document.getElementById('aFoto');
  if(fotoInput) fotoInput.onchange = (e)=>{
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = (ev)=>{
      const img = new Image();
      img.onload = ()=>{
        const maxSize = 360;
        let w = img.width, h = img.height;
        if(w>h && w>maxSize){ h = h*(maxSize/w); w = maxSize; }
        else if(h>=w && h>maxSize){ w = w*(maxSize/h); h = maxSize; }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        pendingFotoAtivoDataUrl = canvas.toDataURL('image/jpeg', 0.7);
        renderView();
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  };

  const saveBtn = document.getElementById('saveAtivoBtn');
  if(saveBtn) saveBtn.onclick = async ()=>{
    const codigo = document.getElementById('aCodigo').value.trim();
    const nome = document.getElementById('aNome').value.trim();
    if(!codigo || !nome){ toast('Preencha ao menos código e nome'); return; }
    if(DB.ativos.some(a=>a.codigo.toLowerCase()===codigo.toLowerCase() && (!editingAtivo || a.id!==editingAtivo.id))){
      toast('Já existe um ativo cadastrado com esse código'); return;
    }
    const dados = {
      codigo, nome,
      tipo: document.getElementById('aTipo').value,
      fabricante: document.getElementById('aFabricante').value.trim(),
      modelo: document.getElementById('aModelo').value.trim(),
      numeroSerie: document.getElementById('aNumeroSerie').value.trim(),
      placaIdentificacao: document.getElementById('aPlaca').value.trim(),
      potencia: document.getElementById('aPotencia').value.trim(),
      localizacao: document.getElementById('aLocalizacao').value.trim(),
      criticidade: document.getElementById('aCriticidade').value,
      observacoes: document.getElementById('aObservacoes').value.trim(),
      foto: pendingFotoAtivoDataUrl || (editingAtivo ? editingAtivo.foto : '') || ''
    };
    if(editingAtivo){ Object.assign(editingAtivo, dados); }
    else { DB.ativos.push({id:uid(), ...dados, ativo:true, dataCadastro:new Date().toISOString()}); }
    await saveAll(KEYS.ativos, DB.ativos);
    showAtivoForm=false; editingAtivo=null; pendingFotoAtivoDataUrl=''; toast('Ativo salvo'); renderView();
  };

  const deactivateBtn = document.getElementById('deactivateAtivoBtn');
  if(deactivateBtn) deactivateBtn.onclick = async ()=>{
    editingAtivo.ativo = editingAtivo.ativo===false;
    await saveAll(KEYS.ativos, DB.ativos);
    const msg = editingAtivo.ativo===false ? 'Ativo desativado' : 'Ativo reativado';
    showAtivoForm=false; editingAtivo=null; toast(msg); renderView();
  };

  const deleteBtn = document.getElementById('deleteAtivoBtn');
  if(deleteBtn) deleteBtn.onclick = async ()=>{
    if(!confirm(`Excluir "${editingAtivo.nome}" definitivamente? Essa ação não pode ser desfeita.`)) return;
    DB.ativos = DB.ativos.filter(a=>a.id!==editingAtivo.id);
    await saveAll(KEYS.ativos, DB.ativos);
    showAtivoForm=false; editingAtivo=null; toast('Ativo excluído'); renderView();
  };
}

function handleImportAtivosFile(e){
  const file = e.target.files[0];
  if(!file) return;
  if(!window.XLSX){ toast('Biblioteca de planilhas não carregou. Verifique sua conexão.'); return; }
  const reader = new FileReader();
  reader.onload = async (ev)=>{
    try{
      const data = new Uint8Array(ev.target.result);
      const wb = XLSX.read(data, {type:'array'});
      const sheet = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(sheet, {header:1, defval:''});
      const dataRows = rows.slice(1).filter(r=>r && r[0] !== '' && r[0] !== undefined);
      if(dataRows.length===0){ toast('Nenhum dado encontrado na planilha'); return; }

      let novos=0, atualizados=0, ignorados=0;

      for(const row of dataRows){
        const codigo = String(row[0]||'').trim();
        const nome = String(row[1]||'').trim();
        const tipo = String(row[2]||'').trim();
        const fabricante = String(row[3]||'').trim();
        const modelo = String(row[4]||'').trim();
        const numeroSerie = String(row[5]||'').trim();
        const placaIdentificacao = String(row[6]||'').trim();
        const potencia = String(row[7]||'').trim();
        const localizacao = String(row[8]||'').trim();
        const criticidade = String(row[9]||'').trim().toUpperCase();
        if(!codigo || !nome) continue;

        const existente = DB.ativos.find(a=>a.codigo.toLowerCase()===codigo.toLowerCase());
        if(!existente){
          DB.ativos.push({id:uid(), codigo, nome, tipo, fabricante, modelo, numeroSerie, placaIdentificacao, potencia, localizacao, criticidade:(['A','B','C'].includes(criticidade)?criticidade:''), observacoes:'', foto:'', ativo:true, dataCadastro:new Date().toISOString()});
          novos++;
        } else {
          const msg = `O ativo "${codigo}" já existe:\n\nCadastro atual: ${existente.nome}\nNa planilha: ${nome}\n\nDeseja atualizar o cadastro com os dados da planilha?`;
          if(confirm(msg)){
            Object.assign(existente, {nome, tipo, fabricante, modelo, numeroSerie, placaIdentificacao, potencia, localizacao, criticidade:(['A','B','C'].includes(criticidade)?criticidade:existente.criticidade)});
            atualizados++;
          } else { ignorados++; }
        }
      }
      await saveAll(KEYS.ativos, DB.ativos);
      toast(`Importação concluída: ${novos} novos, ${atualizados} atualizados, ${ignorados} ignorados`);
      renderView();
    }catch(err){
      console.error(err);
      toast('Não foi possível ler a planilha. Verifique o formato do arquivo.');
    }
    e.target.value = '';
  };
  reader.readAsArrayBuffer(file);
}

function exportAtivosXlsx(){
  if(!window.XLSX){ toast('Biblioteca de planilhas não carregou.'); return; }
  const arr = DB.ativos.filter(a=>a.ativo!==false);
  if(arr.length===0){ toast('Nenhum ativo cadastrado'); return; }
  const rows = arr.map(a=>({
    'Código': a.codigo, 'Nome': a.nome, 'Tipo': a.tipo||'', 'Fabricante': a.fabricante||'',
    'Modelo': a.modelo||'', 'Número de Série': a.numeroSerie||'', 'Placa de Identificação': a.placaIdentificacao||'',
    'Potência': a.potencia||'', 'Localização': a.localizacao||'', 'Criticidade': a.criticidade||'',
    'Observações': a.observacoes||'', '% Preenchimento': ativoCompletudePct(a)+'%'
  }));
  const ws = XLSX.utils.json_to_sheet(rows);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Ativos');
  XLSX.writeFile(wb, `ativos-${new Date().toISOString().slice(0,10)}.xlsx`);
}

function renderLoginScanner(){
  const holder = document.getElementById('loginScanHolder');
  if(!loginScanning){ holder.innerHTML=''; stopScanner(); return; }
  holder.innerHTML = `<div class="overlay" id="loginScanOverlay"><div class="sheet">

    <div class="note" id="scanStatus">Aponte a câmera para o QR Code de acesso fornecido pelo administrador.</div>
    <canvas id="scanCanvas" class="hidden"></canvas>
  </div></div>`;
  document.getElementById('closeLoginScan').onclick = ()=>{ loginScanning=false; renderLoginScanner(); };
  startLoginScanner();

async function startLoginScanner(){
  try{
    scanStream = await navigator.mediaDevices.getUserMedia({ video:{ facingMode:'environment' } });
    const video = document.getElementById('scanVideo');
    video.srcObject = scanStream;
    const canvas = document.getElementById('scanCanvas');
    const ctx = canvas.getContext('2d');
    const tick = ()=>{
      if(!loginScanning || !scanStream) return;
      if(video.readyState === video.HAVE_ENOUGH_DATA){
        canvas.width = video.videoWidth; canvas.height = video.videoHeight;
        ctx.drawImage(video,0,0,canvas.width,canvas.height);
        const img = ctx.getImageData(0,0,canvas.width,canvas.height);
        const code = window.jsQR ? jsQR(img.data, img.width, img.height) : null;
        if(code && code.data){
          const parts = code.data.split(':');
          if(parts.length===2){
            stopScanner(); loginScanning=false; renderLoginScanner();
            window._ertelDoLogin(parts[0], parts[1]);
            return;
          } else {
            const st = document.getElementById('scanStatus'); if(st) st.textContent = 'QR Code inválido para acesso.';
          }
        }
      }
      requestAnimationFrame(tick);
    };
    requestAnimationFrame(tick);
  }catch(e){
    const st = document.getElementById('scanStatus');
    if(st) st.textContent = 'Não foi possível acessar a câmera.';
  }
}

/* ============ DASHBOARD ============ */
function abcClassification(){
  const withValue = getProdutosArr().filter(p=>p.ativo!==false).map(p=>({...p, total:(p.quantidade||0)*(p.valorUnitario||0)}));
  withValue.sort((a,b)=>b.total-a.total);
  const grandTotal = withValue.reduce((s,p)=>s+p.total,0) || 1;
  let cum = 0;
  return withValue.map(p=>{
    cum += p.total;
    const pct = cum/grandTotal;
    const classe = pct<=0.8 ? 'A' : (pct<=0.95 ? 'B' : 'C');
    return {...p, classe};
  });
}

  html += `</div>`;

  html += `<h2 class="section-title">Classificação ABC</h2><div class="card">
    <div style="display:flex;justify-content:space-between;padding:6px 0"><span><span class="pill A">A</span> Maior valor</span><span class="qtd" style="font-family:var(--font-mono)">${abcCount.A} produtos</span></div>
    <div style="display:flex;justify-content:space-between;padding:6px 0;border-top:1px solid var(--paper-2)"><span><span class="pill B">B</span> Valor médio</span><span class="qtd" style="font-family:var(--font-mono)">${abcCount.B} produtos</span></div>
    <div style="display:flex;justify-content:space-between;padding:6px 0;border-top:1px solid var(--paper-2)"><span><span class="pill C">C</span> Menor valor</span><span class="qtd" style="font-family:var(--font-mono)">${abcCount.C} produtos</span></div>
  </div>`;

  if(centrosRank.length>0){
    html += `<h2 class="section-title">Consumo por Centro de Custo (mês)</h2><div class="card">`;
    centrosRank.forEach((c,i)=>{ html += `<div style="display:flex;justify-content:space-between;padding:6px 0;${i>0?'border-top:1px solid var(--paper-2)':''}"><span>${c.nome}</span><span style="font-family:var(--font-mono)">${money(c.val)}</span></div>`; });
    html += `</div>`;
  }

  return html;
}

/* ============ PRODUTOS ============ */
let produtoSearch = '';
let editingProduto = null;
let showProdutoForm = false;
let pendingFotoDataUrl = '';
let mostrarInativosProdutos = false;

function produtosView(){

function produtoFormSheet(){
  const p = editingProduto || {codigo:'',descricao:'',quantidade:0,valorUnitario:0,estoqueMinimo:0,endereco:'',foto:'',unidade:(moduloAtivo==='lub'?'litro':'peça')};
  const fotoAtual = pendingFotoDataUrl || p.foto || '';

  return `
  <div class="overlay" id="prodOverlay"><div class="sheet">
    <div class="sheet-head"><h2 class="section-title" style="margin:0">${editingProduto?(moduloAtivo==='lub'?'Editar Óleo':'Editar Produto'):(moduloAtivo==='lub'?'Novo Óleo':'Novo Produto')}</h2><button class="close" id="closeProdForm">×</button></div>

    <label>Foto do produto</label>
    <div style="display:flex;align-items:center;gap:12px">
      ${fotoAtual?`<img src="${fotoAtual}" style="width:56px;height:56px;object-fit:cover;border-radius:8px;border:1px solid var(--line)">`:`<div style="width:56px;height:56px;border-radius:8px;background:var(--paper-2);display:flex;align-items:center;justify-content:center;color:var(--muted)">${ICONS.camera}</div>`}
      <input type="file" accept="image/*" id="fFoto" style="flex:1">
    </div>

    <label>Descrição</label>
    <input id="fDescricao" value="${p.descricao}" placeholder="Ex: Parafuso M8 sextavado">

      <div><label>Unidade</label><select id="fUnidade">${unidades.map(u=>`<option value="${u}" ${(p.unidade||'peça')===u?'selected':''}>${u}</option>`).join('')}</select></div>

    <input id="fValor" type="number" step="0.01" value="${p.valorUnitario}">

    <input id="fMinimo" type="number" value="${p.estoqueMinimo}">
    <button class="btn btn-primary" id="saveProdBtn">${editingProduto?'Salvar alterações':'Confirmar cadastro'}</button>

function attachProdutosEvents(){
  const s = document.getElementById('prodSearch');
  if(s) s.oninput = ()=>{ produtoSearch = s.value; renderView(); const el=document.getElementById('prodSearch'); if(el){el.focus(); el.setSelectionRange(el.value.length, el.value.length);} };

  const mostrarInativosChk = document.getElementById('mostrarInativosChk');
  if(mostrarInativosChk) mostrarInativosChk.onchange = ()=>{ mostrarInativosProdutos = mostrarInativosChk.checked; renderView(); };

  const newBtn = document.getElementById('newProdBtn');
  if(newBtn) newBtn.onclick = ()=>{ editingProduto=null; pendingFotoDataUrl=''; showProdutoForm=true; renderView(); };

  document.querySelectorAll('.editProd').forEach(b=>{
    b.onclick = ()=>{ editingProduto = getProdutosArr().find(p=>p.id===b.dataset.id); pendingFotoDataUrl=''; showProdutoForm=true; renderView(); };
  });
  document.querySelectorAll('.qrProd').forEach(b=>{
    b.onclick = ()=>{ showQrModal(b.dataset.id); };
  });

  const closeBtn = document.getElementById('closeProdForm');
  if(closeBtn) closeBtn.onclick = ()=>{ showProdutoForm=false; pendingFotoDataUrl=''; renderView(); };

  const fotoInput = document.getElementById('fFoto');
  if(fotoInput) fotoInput.onchange = (e)=>{
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = (ev)=>{
      const img = new Image();
      img.onload = ()=>{
        const maxSize = 360;
        let w = img.width, h = img.height;
        if(w>h && w>maxSize){ h = h*(maxSize/w); w = maxSize; }
        else if(h>=w && h>maxSize){ w = w*(maxSize/h); h = maxSize; }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        pendingFotoDataUrl = canvas.toDataURL('image/jpeg', 0.7);
        renderView();
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  };

  const saveBtn = document.getElementById('saveProdBtn');
  if(saveBtn) saveBtn.onclick = async ()=>{
    const codigo = document.getElementById('fCodigo').value.trim();
    const descricao = document.getElementById('fDescricao').value.trim();
    const endereco = document.getElementById('fEndereco').value.trim();
    const unidade = document.getElementById('fUnidade').value;
    const quantidade = parseFloat(document.getElementById('fQuantidade').value)||0;
    const valorUnitario = parseFloat(document.getElementById('fValor').value)||0;
    const estoqueMinimo = parseFloat(document.getElementById('fMinimo').value)||0;
    if(!codigo || !descricao){ toast('Preencha código e descrição'); return; }
    const dup = codigoJaExisteEmOutroModulo(codigo, editingProduto?editingProduto.id:null);
    if(dup.existe){ toast(`Código já cadastrado em "${dup.modulo}" (${dup.produto.descricao}). Use outro código.`); return; }
    const foto = pendingFotoDataUrl || (editingProduto ? editingProduto.foto : '') || '';
    if(editingProduto){
      Object.assign(editingProduto, {codigo,descricao,endereco,unidade,quantidade,valorUnitario,estoqueMinimo,foto});
    } else {
      getProdutosArr().push({id:uid(),codigo,descricao,endereco,unidade,quantidade,valorUnitario,estoqueMinimo,foto,ativo:true,dataCadastro:new Date().toISOString()});
    }
    await saveAll(getProdutosKey(), getProdutosArr());
    showProdutoForm=false; editingProduto=null; pendingFotoDataUrl=''; toast('Produto salvo'); renderView();
  };

  const deactivateBtn = document.getElementById('deactivateProdBtn');
  if(deactivateBtn) deactivateBtn.onclick = async ()=>{
    editingProduto.ativo = editingProduto.ativo===false;
    await saveAll(getProdutosKey(), getProdutosArr());
    const msg = editingProduto.ativo===false ? 'Produto desativado' : 'Produto reativado';
    showProdutoForm=false; editingProduto=null; toast(msg); renderView();
  };

  const deleteBtn = document.getElementById('deleteProdBtn');
  if(deleteBtn) deleteBtn.onclick = async ()=>{
    if(!confirm(`Excluir "${editingProduto.descricao}" definitivamente? O histórico de retiradas já feitas continua intacto (as informações ficam salvas na própria retirada), mas essa ação não pode ser desfeita.`)) return;
    const arr = getProdutosArr().filter(p=>p.id!==editingProduto.id);
    await setProdutosArr(arr);
    showProdutoForm=false; editingProduto=null; toast('Produto excluído'); renderView();
  };

}

function showQrModal(pid){
  const p = getProdutosArr().find(x=>x.id===pid);
  if(!p) return;
  const holder = document.getElementById('qrModalHolder');
  holder.innerHTML = `<div class="overlay" id="qrOverlay"><div class="sheet" style="text-align:center">
    <div class="sheet-head"><h2 class="section-title" style="margin:0">QR Code — ${p.codigo}</h2><button class="close" id="closeQr">×</button></div>
    <div id="qrCanvasWrap" style="display:flex;justify-content:center;margin:16px 0"></div>
    <div class="note">${p.descricao}</div>
  </div></div>`;
  document.getElementById('closeQr').onclick = ()=>{ holder.innerHTML=''; };
  try{ new QRCode(document.getElementById('qrCanvasWrap'), {text:p.codigo, width:180, height:180}); }
  catch(e){ document.getElementById('qrCanvasWrap').innerHTML = `<div class="note">Código: <b>${p.codigo}</b></div>`; }
}

/* ============ RETIRADA ============ */
let retiradaSelectedProduto = null;
let showScanner = false;
let retiradaBusca = '';

function retiradaView(){
  let html = `<h2 class="section-title">${moduloAtivo==='lub'?'Retirar Óleo':'Nova Retirada'}</h2>`;
  html += `<button class="btn btn-amber" id="scanBtn"><span>${ICONS.qr}</span>Escanear QR Code do material</button>`;

    const matches = getProdutosArr().filter(p=>p.ativo!==false && (p.descricao.toLowerCase().includes(retiradaBusca.toLowerCase()) || p.codigo.toLowerCase().includes(retiradaBusca.toLowerCase()))).slice(0,8);
    if(matches.length===0){
      html += `<div class="note">Nenhum produto encontrado.</div>`;
    } else {
      matches.forEach(p=>{

          <div class="inner">
            <div class="row1"><span class="codigo">${p.codigo}</span><span class="qtd ${semEstoque?'low':''}">${p.quantidade} ${p.unidade||'un'}</span></div>
            <div class="desc">${p.descricao}</div>
            ${semEstoque?`<div class="note" style="color:var(--brick)">Sem estoque disponível</div>`:''}
          </div>
        </div>`;
      });
    }
  }

  const p = getProdutosArr().find(x=>x.id===retiradaSelectedProduto);
  if(p){
    const semEstoque = (p.quantidade||0) <= 0;
    html += `<div class="card" style="margin-top:12px">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div style="display:flex;gap:12px;align-items:center">
          ${p.foto?`<img src="${p.foto}" style="width:54px;height:54px;object-fit:cover;border-radius:8px;flex-shrink:0">`:`<div style="width:54px;height:54px;border-radius:8px;background:var(--paper-2);display:flex;align-items:center;justify-content:center;color:var(--muted);flex-shrink:0">${ICONS.box}</div>`}
          <div>
            <div class="desc">${p.descricao}</div>
            <div class="meta" style="font-family:var(--font-mono);font-size:11.5px;margin-top:3px">${p.codigo}</div>
          </div>
        </div>
        <button class="btn btn-ghost btn-sm" id="trocarProdBtn" style="width:auto;margin:0;padding:6px 10px;flex-shrink:0">Trocar</button>
      </div>
      <div class="meta" style="display:flex;justify-content:space-between;font-family:var(--font-mono);font-size:12px;color:var(--muted);margin-top:10px">
        <span>Disponível: ${p.quantidade} ${p.unidade||"un"}</span>${isAdminLevel()?`<span>${money(p.valorUnitario)}/${p.unidade||"un"}</span>`:'<span></span>'}
      </div>

      ${semEstoque?`<div class="note" style="color:var(--brick);font-weight:600;margin-top:10px">Este produto está sem estoque disponível. Não é possível confirmar a retirada.</div>`:`
      <label>Quantidade a retirar</label>
      <input id="retQtd" type="number" min="1" max="${p.quantidade}" value="1">

      <label>Centro de custo / Local de uso</label>
      <select id="retCentro"><option value="">Selecione...</option>
        ${DB.centros.filter(c=>c.ativo!==false).map(c=>`<option value="${c.id}">${c.codigo} — ${c.descricao}</option>`).join('')}
      </select>
      <div class="note">É obrigatório informar o local de uso antes de confirmar a retirada.</div>

      <label>Nº da Ordem de Serviço (opcional)</label>
      <input id="retOS" placeholder="Ex: OS-4521">

      <button class="btn btn-primary" id="confirmRetiradaBtn">Confirmar retirada</button>`}
    </div>`;
  }

  if(showScanner){
    html += `<div class="overlay" id="scanOverlay"><div class="sheet">
      <div class="sheet-head"><h2 class="section-title" style="margin:0">Escanear QR Code</h2><button class="close" id="closeScan">×</button></div>
      <div class="qr-box"><video id="scanVideo" autoplay playsinline muted></video><div class="qr-frame"></div></div>
      <div class="note" id="scanStatus">Aponte a câmera para o QR Code do material.</div>
      <canvas id="scanCanvas" class="hidden"></canvas>
    </div></div>`;
  }
  return html;
}

function attachRetiradaEvents(){
  const scanBtn = document.getElementById('scanBtn');
  if(scanBtn) scanBtn.onclick = ()=>{ showScanner=true; renderView(); startScanner(); };

  const buscaInput = document.getElementById('retBusca');
  if(buscaInput) buscaInput.oninput = ()=>{ retiradaBusca = buscaInput.value; renderView(); const el=document.getElementById('retBusca'); if(el){el.focus(); el.setSelectionRange(el.value.length, el.value.length);} };

  document.querySelectorAll('.selRetProd').forEach(el=>{
    el.onclick = ()=>{ retiradaSelectedProduto = el.dataset.id; retiradaBusca=''; renderView(); };
  });

  const trocarBtn = document.getElementById('trocarProdBtn');
  if(trocarBtn) trocarBtn.onclick = ()=>{ retiradaSelectedProduto = null; renderView(); };

  const confirmBtn = document.getElementById('confirmRetiradaBtn');
  if(confirmBtn) confirmBtn.onclick = async ()=>{
    const p = getProdutosArr().find(x=>x.id===retiradaSelectedProduto);
    if(!p || (p.quantidade||0)<=0){ toast('Produto sem estoque disponível'); return; }
    const qtd = parseFloat(document.getElementById('retQtd').value)||0;
    const centroId = document.getElementById('retCentro').value;
    const os = document.getElementById('retOS').value.trim();
    if(!centroId){ toast('Informe o local de uso (centro de custo)'); return; }
    if(qtd<=0 || qtd>p.quantidade){ toast('Quantidade inválida ou maior que o estoque disponível'); return; }
    const centro = DB.centros.find(c=>c.id===centroId);
    p.quantidade -= qtd;
    const retirada = {
      id:uid(), produtoId:p.id, produtoCodigo:p.codigo, produtoDescricao:p.descricao, produtoUnidade:p.unidade||'un',
      quantidadeRetirada:qtd, usuarioId:currentUser.id,
      centroCustoId:centroId, localUsoCodigo:centro.codigo, localUsoDescricao:centro.descricao,
      ordemServico: os || '', dataHora:new Date().toISOString(), valorTotal: qtd*(p.valorUnitario||0), origem:'manual'
    };
    getRetiradasArr().unshift(retirada);
    if(DB.config.whatsappResumo){
      const dh = new Date(retirada.dataHora);
      const linhas = [
        `*ERTEL — Resumo de Retirada (${moduloAtivo==='lub'?'Sala de Lubrificantes':'Estoque MRO'})*`,
        `Produto: ${p.descricao} (${p.codigo})`,
        `Quantidade: ${qtd} ${p.unidade||'un'}`,
        `Centro de custo: ${centro.codigo} — ${centro.descricao}`,
        os?`OS: ${os}`:null,
        `Usuário: ${currentUser.nome}`,
        `Data/hora: ${dh.toLocaleDateString('pt-BR')} ${dh.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})}`
      ].filter(Boolean).join('\n');
      window.open(`https://wa.me/${DB.config.whatsappResumo}?text=${encodeURIComponent(linhas)}`, '_blank');
    }
    await saveAll(getProdutosKey(), getProdutosArr());
    await saveAll(getRetiradasKey(), getRetiradasArr());
    toast('Retirada confirmada — estoque atualizado');
    retiradaSelectedProduto = null; retiradaBusca=''; renderView();
  };

  const closeScan = document.getElementById('closeScan');
  if(closeScan) closeScan.onclick = ()=>{ stopScanner(); showScanner=false; renderView(); };
}

async function startScanner(){
  try{
    scanStream = await navigator.mediaDevices.getUserMedia({ video:{ facingMode:'environment' } });
    const video = document.getElementById('scanVideo');
    video.srcObject = scanStream;
    const canvas = document.getElementById('scanCanvas');
    const ctx = canvas.getContext('2d');
    const tick = ()=>{
      if(!showScanner || !scanStream) return;
      if(video.readyState === video.HAVE_ENOUGH_DATA){
        canvas.width = video.videoWidth; canvas.height = video.videoHeight;
        ctx.drawImage(video,0,0,canvas.width,canvas.height);
        const img = ctx.getImageData(0,0,canvas.width,canvas.height);
        const code = window.jsQR ? jsQR(img.data, img.width, img.height) : null;
        if(code && code.data){
          const produto = getProdutosArr().find(p=>p.codigo===code.data);
          if(produto){
            stopScanner(); showScanner=false; retiradaSelectedProduto = produto.id;
            renderView(); toast('Material identificado: '+produto.descricao);
            return;
          } else {
            const st = document.getElementById('scanStatus'); if(st) st.textContent = 'Código lido não corresponde a nenhum produto cadastrado.';
          }
        }
      }
      requestAnimationFrame(tick);
    };
    requestAnimationFrame(tick);
  }catch(e){
    const st = document.getElementById('scanStatus');
    if(st) st.textContent = 'Não foi possível acessar a câmera. Verifique a permissão do navegador, ou selecione o produto manualmente.';
  }
}
function stopScanner(){
  if(scanStream){ scanStream.getTracks().forEach(t=>t.stop()); scanStream=null; }
}

function historicoView(){
  const isAdmin = isAdminLevel();
  const list = getRetiradasArr().filter(r=> isAdmin || r.usuarioId===currentUser.id);

  list.forEach(r=>{
    const p = getProdutosArr().find(x=>x.id===r.produtoId);
    const descricao = r.produtoDescricao || (p? p.descricao : '(produto removido)');
    const unidade = r.produtoUnidade || (p? (p.unidade||'un') : 'un');
    const u = DB.usuarios.find(x=>x.id===r.usuarioId);
    const d = new Date(r.dataHora);
    html += `<div class="card">
      <div class="row1" style="display:flex;justify-content:space-between">
        <b>${descricao}</b><span style="font-family:var(--font-mono)">${r.quantidadeRetirada} ${unidade}</span>
      </div>

      <div class="meta" style="display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-top:6px;font-family:var(--font-mono)">        <span>${d.toLocaleDateString('pt-BR')} ${d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})}</span>
        ${isAdmin?`<span>${money(r.valorTotal)}</span>`:''}
      </div>
      <div class="note">Local de uso: ${r.localUsoCodigo} — ${r.localUsoDescricao} ${isAdmin && u? '· Por: '+u.nome : ''} ${r.origem==='qrcode'?'· via QR':''}</div>
      ${r.ordemServico?`<div class="note">OS: <b>${r.ordemServico}</b></div>`:''}
    </div>`;
  });
  return html;
}

function attachMaisEvents(){
  const tc = document.getElementById('tabCentros'); if(tc) tc.onclick=()=>{maisTab='centros'; renderView();};
  const tu = document.getElementById('tabUsuarios'); if(tu) tu.onclick=()=>{maisTab='usuarios'; renderView();};
  const talert = document.getElementById('tabAlertas'); if(talert) talert.onclick=()=>{maisTab='alertas'; renderView();};
  const tind = document.getElementById('tabIndicadores'); if(tind) tind.onclick=()=>{maisTab='indicadores'; renderView();};
  const tie = document.getElementById('tabImportExport'); if(tie) tie.onclick=()=>{maisTab='importexport'; renderView();};
  const tinv = document.getElementById('tabInventario'); if(tinv) tinv.onclick=()=>{maisTab='inventario'; renderView();};

  const addCentro = document.getElementById('addCentroBtn');
  if(addCentro) addCentro.onclick = async ()=>{
    const codigo = document.getElementById('ccCodigo').value.trim();
    const descricao = document.getElementById('ccDescricao').value.trim();
    if(!codigo || !descricao){ toast('Preencha código e descrição'); return; }
    if(DB.centros.some(c=>c.codigo.toLowerCase()===codigo.toLowerCase())){ toast('Já existe um centro de custo com esse código'); return; }
    DB.centros.push({id:uid(), codigo, descricao, ativo:true});
    await saveAll(KEYS.centros, DB.centros);
    toast('Centro de custo adicionado'); renderView();
  };
  document.querySelectorAll('.toggleCentro').forEach(b=>{
    b.onclick = async ()=>{ const c = DB.centros.find(x=>x.id===b.dataset.id); c.ativo = c.ativo===false; await saveAll(KEYS.centros, DB.centros); renderView(); };
  });
  document.querySelectorAll('.deleteCentro').forEach(b=>{
    b.onclick = async ()=>{
      if(!confirm('Excluir este centro de custo definitivamente? Retiradas antigas que usam ele continuam no histórico.')) return;
      DB.centros = DB.centros.filter(c=>c.id!==b.dataset.id);
      await saveAll(KEYS.centros, DB.centros);
      toast('Centro de custo excluído'); renderView();
    };
  });

  const addUser = document.getElementById('addUserBtn');
  if(addUser) addUser.onclick = async ()=>{
    const nome = document.getElementById('uNome').value.trim();
    const login = document.getElementById('uLogin').value.trim();
    const senha = document.getElementById('uSenha').value.trim();
    const nivel = document.getElementById('uNivel').value;
    const modulos = [];
    if(document.getElementById('uModMro').checked) modulos.push('mro');
    if(document.getElementById('uModLub').checked) modulos.push('lub');
    if(document.getElementById('uModAtivos').checked) modulos.push('ativos');
    if(!nome || !login || !senha){ toast('Preencha nome, login e senha'); return; }
    if(modulos.length===0){ toast('Marque pelo menos um módulo (MRO ou Lubrificantes)'); return; }
    if(DB.usuarios.some(x=>x.login===login)){ toast('Já existe um usuário com esse login'); return; }
    DB.usuarios.push({id:uid(), nome, perfil:(nivel==='adm'?'adm':'usuario'), login, senha, master:false, adminLevel:(nivel==='adm'), modulos, ativo:true});
    await saveAll(KEYS.usuarios, DB.usuarios);
    toast('Usuário adicionado'); renderView();
  };
  document.querySelectorAll('.toggleUser').forEach(b=>{
    b.onclick = async ()=>{ const u = DB.usuarios.find(x=>x.id===b.dataset.id); u.ativo = u.ativo===false; await saveAll(KEYS.usuarios, DB.usuarios); renderView(); };
  });
  document.querySelectorAll('.deleteUser').forEach(b=>{
    b.onclick = async ()=>{
      const u = DB.usuarios.find(x=>x.id===b.dataset.id);
      if(u && u.master){ toast('Não é possível excluir o acesso master'); return; }
      if(!confirm(`Excluir o usuário "${u?u.nome:''}" definitivamente? Retiradas antigas feitas por ele continuam no histórico.`)) return;
      DB.usuarios = DB.usuarios.filter(x=>x.id!==b.dataset.id);
      await saveAll(KEYS.usuarios, DB.usuarios);
      toast('Usuário excluído'); renderView();
    };
  });

  const saveWhatsBtn = document.getElementById('saveWhatsappBtn');
  if(saveWhatsBtn) saveWhatsBtn.onclick = async ()=>{
    const numero = document.getElementById('whatsappResumo').value.replace(/\D/g,'');
    if(!numero){ toast('Informe um número válido'); return; }
    DB.config.whatsappResumo = numero;
    await saveAll(KEYS.config, DB.config);
    toast('Número salvo'); renderView();
  };

  document.querySelectorAll('.saveCred').forEach(b=>{
    b.onclick = async ()=>{
      if(!isMaster()) return;
      const id = b.dataset.id;
      const loginField = document.querySelector(`.credLogin[data-id="${id}"]`);
      const senhaField = document.querySelector(`.credSenha[data-id="${id}"]`);
      const novoLogin = loginField.value.trim();
      const novaSenha = senhaField.value.trim();
      if(!novoLogin || !novaSenha){ toast('Login e senha não podem ficar vazios'); return; }
      if(DB.usuarios.some(x=>x.login===novoLogin && x.id!==id)){ toast('Já existe um usuário com esse login'); return; }
      const u = DB.usuarios.find(x=>x.id===id);
      u.login = novoLogin; u.senha = novaSenha;
      if(!u.master){
        const nivelField = document.querySelector(`.credNivel[data-id="${id}"]`);
        if(nivelField){ u.adminLevel = nivelField.value==='adm'; u.perfil = nivelField.value==='adm'?'adm':'usuario'; }
        const modMroField = document.querySelector(`.credModMro[data-id="${id}"]`);
        const modLubField = document.querySelector(`.credModLub[data-id="${id}"]`);
        const modAtivosField = document.querySelector(`.credModAtivos[data-id="${id}"]`);
        if(modMroField && modLubField){
          const modulos = [];
          if(modMroField.checked) modulos.push('mro');
          if(modLubField.checked) modulos.push('lub');
          if(modAtivosField && modAtivosField.checked) modulos.push('ativos');
          if(modulos.length===0){ toast('Marque pelo menos um módulo para este usuário'); return; }
          u.modulos = modulos;
        }
      }
      await saveAll(KEYS.usuarios, DB.usuarios);
      toast('Credenciais atualizadas'); renderView();
    };
  });

  document.querySelectorAll('.genQrCred').forEach(b=>{
    b.onclick = ()=>{
      const u = DB.usuarios.find(x=>x.id===b.dataset.id);
      const holder = document.getElementById('loginQrModalHolder');
      holder.innerHTML = `<div class="overlay" id="loginQrOverlay"><div class="sheet" style="text-align:center">
        <div class="sheet-head"><h2 class="section-title" style="margin:0">QR de Acesso — ${u.nome}</h2><button class="close" id="closeLoginQr">×</button></div>
        <div id="loginQrCanvasWrap" style="display:flex;justify-content:center;margin:16px 0"></div>
        <div class="note">Este código dá acesso direto ao ERTEL com o login de ${u.nome}. Compartilhe apenas com a própria pessoa.</div>
      </div></div>`;
      document.getElementById('closeLoginQr').onclick = ()=>{ holder.innerHTML=''; };
      try{ new QRCode(document.getElementById('loginQrCanvasWrap'), {text:`${u.login}:${u.senha}`, width:180, height:180}); }
      catch(e){ document.getElementById('loginQrCanvasWrap').innerHTML = `<div class="note">Não foi possível gerar o QR.</div>`; }
    };
  });

  if(maisTab==='inventario') attachInventarioEvents();
  if(maisTab==='indicadores') attachIndicadoresEvents();
  if(maisTab==='importexport') attachImportExportEvents();
}

let invBusca = '';
let invProdutoAtual = null;
let invItens = [];
let invScanning = false;
let invNotFound = false;

/* ============ INDICADORES ============ */
let indModo = 'periodo';
let indDia = new Date().toISOString().slice(0,10);
let indInicio = new Date(new Date().getFullYear(), new Date().getMonth(), 1).toISOString().slice(0,10);
let indFim = new Date().toISOString().slice(0,10);

function filtrarRetiradasIndicadores(){
  let ini, fim;
  if(indModo==='dia'){ ini = new Date(indDia+'T00:00:00'); fim = new Date(indDia+'T23:59:59'); }
  else { ini = new Date(indInicio+'T00:00:00'); fim = new Date(indFim+'T23:59:59'); }
  return getRetiradasArr().filter(r=>{ const d = new Date(r.dataHora); return d>=ini && d<=fim; });
}

function indicadoresSection(){
  let html = `<div class="row-2">
    <button class="btn ${indModo==='dia'?'btn-primary':'btn-ghost'} btn-sm" id="indModoDia">Por dia</button>
    <button class="btn ${indModo==='periodo'?'btn-primary':'btn-ghost'} btn-sm" id="indModoPeriodo">Por período</button>
  </div>`;
  if(indModo==='dia'){
    html += `<label>Data</label><input type="date" id="indDataDia" value="${indDia}">`;
  } else {
    html += `<div class="row-2">
      <div><label>De</label><input type="date" id="indDataIni" value="${indInicio}"></div>
      <div><label>Até</label><input type="date" id="indDataFim" value="${indFim}"></div>
    </div>`;
  }
  html += `<button class="btn btn-primary btn-sm" id="indAplicarBtn">Aplicar filtro</button>`;

  const retiradas = filtrarRetiradasIndicadores();
  const qtdGeral = retiradas.reduce((s,r)=>s+(r.quantidadeRetirada||0),0);
  const custoTotal = retiradas.reduce((s,r)=>s+(r.valorTotal||0),0);

  html += `<div class="metrics" style="margin-top:16px">
    <div class="metric"><div class="val">${qtdGeral}</div><div class="lbl">Peças retiradas no período</div></div>
    <div class="metric amber"><div class="val" style="font-size:18px">${money(custoTotal)}</div><div class="lbl">Custo total no período</div></div>
  </div>`;

  const porCentro = {};
  retiradas.forEach(r=>{
    if(!porCentro[r.centroCustoId]) porCentro[r.centroCustoId] = {qtd:0, custo:0};
    porCentro[r.centroCustoId].qtd += (r.quantidadeRetirada||0);
    porCentro[r.centroCustoId].custo += (r.valorTotal||0);
  });
  const centrosOrdenados = Object.entries(porCentro).sort((a,b)=>b[1].custo-a[1].custo);

  html += `<h2 class="section-title" style="margin-top:18px">Custo e Quantidade por Centro de Custo</h2>`;
  if(centrosOrdenados.length===0){ html += `<div class="empty"><div class="icon">📊</div>Nenhuma retirada no período selecionado.</div>`; }
  else{
    html += `<div class="card"><table class="abc"><tr><th>Centro de Custo</th><th>Qtd.</th><th>Custo</th></tr>`;
    centrosOrdenados.forEach(([cid,v])=>{
      const c = DB.centros.find(x=>x.id===cid);
      html += `<tr><td>${c?c.descricao:cid}</td><td>${v.qtd}</td><td>${money(v.custo)}</td></tr>`;
    });
    html += `</table></div>`;
  }
  return html;
}

function attachIndicadoresEvents(){
  const dDia = document.getElementById('indModoDia'); if(dDia) dDia.onclick=()=>{indModo='dia'; renderView();};
  const dPer = document.getElementById('indModoPeriodo'); if(dPer) dPer.onclick=()=>{indModo='periodo'; renderView();};
  const aplicarBtn = document.getElementById('indAplicarBtn');
  if(aplicarBtn) aplicarBtn.onclick = ()=>{
    if(indModo==='dia'){ indDia = document.getElementById('indDataDia').value || indDia; }
    else { indInicio = document.getElementById('indDataIni').value || indInicio; indFim = document.getElementById('indDataFim').value || indFim; }
    renderView();
  };
}

function handleImportFile(e){
  const file = e.target.files[0];
  if(!file) return;
  if(!window.XLSX){ toast('Biblioteca de planilhas não carregou. Verifique sua conexão.'); return; }
  const reader = new FileReader();
  reader.onload = async (ev)=>{
    try{
      const data = new Uint8Array(ev.target.result);
      const wb = XLSX.read(data, {type:'array'});
      const sheet = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(sheet, {header:1, defval:''});
      const dataRows = rows.slice(1).filter(r=>r && r[0] !== '' && r[0] !== undefined);
      if(dataRows.length===0){ toast('Nenhum dado encontrado na planilha'); return; }

      let novos=0, atualizados=0, ignorados=0;
      const arr = getProdutosArr();

      for(const row of dataRows){
        const codigo = String(row[0]||'').trim();
        const descricao = String(row[1]||'').trim();
        const endereco = String(row[2]||'').trim();
        const unidade = String(row[3]||'peça').trim() || 'peça';
        const quantidade = parseFloat(row[4]) || 0;
        const valorUnitario = parseFloat(row[5]) || 0;
        const estoqueMinimo = parseFloat(row[6]) || 0;
        if(!codigo || !descricao) continue;

        const existente = arr.find(p=>p.codigo.toLowerCase()===codigo.toLowerCase());
        if(!existente){
          const dup = codigoJaExisteEmOutroModulo(codigo, null);
          if(dup.existe){
            ignorados++;
            continue;
          }
          arr.push({id:uid(), codigo, descricao, endereco, unidade, quantidade, valorUnitario, estoqueMinimo, foto:'', ativo:true, dataCadastro:new Date().toISOString()});
          novos++;
        } else {
          const msg = `O produto "${codigo}" já existe:\n\nCadastro atual: ${existente.descricao} — Qtd: ${existente.quantidade}\nNa planilha: ${descricao} — Qtd: ${quantidade}\n\nDeseja atualizar o cadastro com os dados da planilha?`;
          if(confirm(msg)){
            Object.assign(existente, {descricao, endereco, unidade, quantidade, valorUnitario, estoqueMinimo});
            atualizados++;
          } else {
            ignorados++;
          }
        }
      }
      await saveAll(getProdutosKey(), arr);
      toast(`Importação concluída: ${novos} novos, ${atualizados} atualizados, ${ignorados} ignorados`);
      renderView();
    }catch(err){
      console.error(err);
      toast('Não foi possível ler a planilha. Verifique o formato do arquivo.');
    }
    e.target.value = '';
  };
  reader.readAsArrayBuffer(file);
}

function exportProdutosXlsx(){
  if(!window.XLSX){ toast('Biblioteca de planilhas não carregou.'); return; }
  const arr = getProdutosArr().filter(p=>p.ativo!==false);
  const rows = arr.map(p=>({
    'Código': p.codigo,
    'Descrição': p.descricao,
    'Endereço': p.endereco||'',
    'Unidade': p.unidade||'',
    'Quantidade (Saldo Final)': p.quantidade,
    'Valor Unitário': p.valorUnitario,
    'Valor Total': (p.quantidade||0)*(p.valorUnitario||0),
    'Estoque Mínimo': p.estoqueMinimo
  }));
  const ws = XLSX.utils.json_to_sheet(rows);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Produtos');
  XLSX.writeFile(wb, `produtos-${moduloAtivo==='lub'?'lubrificantes':'mro'}-${new Date().toISOString().slice(0,10)}.xlsx`);
}

function exportRetiradasXlsx(){
  if(!window.XLSX){ toast('Biblioteca de planilhas não carregou.'); return; }
  const ini = new Date(exportRetIni+'T00:00:00');
  const fim = new Date(exportRetFim+'T23:59:59');
  const arr = getRetiradasArr().filter(r=>{ const d = new Date(r.dataHora); return d>=ini && d<=fim; });
  if(arr.length===0){ toast('Nenhuma retirada encontrada no período'); return; }
  const rows = arr.map(r=>{
    const p = getProdutosArr().find(x=>x.id===r.produtoId);
    const u = DB.usuarios.find(x=>x.id===r.usuarioId);
    const d = new Date(r.dataHora);
    return {
      'Data': d.toLocaleDateString('pt-BR'),
      'Hora': d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}),
      'Código': r.produtoCodigo || (p?p.codigo:''),
      'Descrição': r.produtoDescricao || (p? p.descricao : '(produto removido)'),
      'Quantidade': r.quantidadeRetirada,
      'Unidade': r.produtoUnidade || (p?(p.unidade||''):''),
      'Valor Total': r.valorTotal,
      'Centro de Custo': r.localUsoCodigo+' - '+r.localUsoDescricao,
      'Ordem de Serviço': r.ordemServico||'',
      'Usuário': u? u.nome : '',
      'Origem': r.origem||''
    };
  });
  const ws = XLSX.utils.json_to_sheet(rows);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Retiradas');
  XLSX.writeFile(wb, `retiradas-${moduloAtivo==='lub'?'lubrificantes':'mro'}-${exportRetIni}_a_${exportRetFim}.xlsx`);
}

/* ============ ALERTAS DE RECOMPRA ============ */
function alertasSection(){
  const alertas = getProdutosArr().filter(p=>p.ativo!==false && (p.quantidade||0) <= (p.estoqueMinimo||0));
  let html = `<div class="note" style="margin-bottom:10px">Produtos que atingiram o estoque mínimo e precisam de recompra.</div>`;
  if(alertas.length===0){
    html += `<div class="empty"><div class="icon">✅</div>Nenhum produto em ponto de recompra no momento.</div>`;
    return html;
  }
  alertas.forEach(p=>{
    html += `<div class="tag-card alert"><div class="inner">
      <div class="row1"><span class="codigo">${p.codigo}</span><span class="qtd low">${p.quantidade} ${p.unidade||'un'}</span></div>
      <div class="desc">${p.descricao}</div>
      <div class="meta"><span>Estoque mínimo: ${p.estoqueMinimo}</span><span>${money(p.valorUnitario)}/${p.unidade||'un'}</span></div>
      ${p.endereco?`<div class="meta" style="margin-top:2px"><span>📍 ${p.endereco}</span><span></span></div>`:''}
    </div></div>`;
  });
  return html;
}


function inventarioSection(){
  let html = `<div class="note" style="margin-bottom:10px">Digite o código do produto ou escaneie o QR Code para conferir a quantidade física.</div>`;
  html += `<div class="search">
    <input id="invCodigo" placeholder="Código do produto" value="${invBusca}">
    <button class="btn btn-primary" style="width:auto;padding:11px 14px;margin:0" id="invBuscarBtn">Buscar</button>
  </div>`;
  html += `<button class="btn btn-amber" id="invScanBtn"><span>${ICONS.qr}</span>Escanear QR Code</button>`;

  if(invNotFound){
    html += `<div class="note" style="color:var(--brick)">Nenhum produto encontrado com esse código.</div>`;
  }

  if(invProdutoAtual){
    const p = invProdutoAtual;
    html += `<div class="card" style="margin-top:12px">
      <div style="display:flex;gap:12px;align-items:center">
        ${p.foto?`<img src="${p.foto}" style="width:54px;height:54px;object-fit:cover;border-radius:8px">`:`<div style="width:54px;height:54px;border-radius:8px;background:var(--paper-2);display:flex;align-items:center;justify-content:center;color:var(--muted)">${ICONS.box}</div>`}
        <div>
          <div class="desc">${p.descricao}</div>
          <div class="meta" style="font-size:11.5px">${p.codigo}${p.endereco?' · 📍 '+p.endereco:''}</div>
        </div>
      </div>
      <div class="meta" style="margin-top:10px"><span>Quantidade no sistema: <b>${p.quantidade}</b> ${p.unidade||"un"}</span></div>
      <label>Quantidade física encontrada</label>
      <input id="invFisica" type="number" placeholder="0">
      <button class="btn btn-primary" id="invAddBtn">Adicionar à contagem</button>
    </div>`;
  }

  if(invItens.length>0){
    html += `<h2 class="section-title" style="margin-top:18px">Itens contados (${invItens.length})</h2>`;
    invItens.forEach((it,idx)=>{
      const desvio = it.fisica - it.sistema;
      html += `<div class="tag-card ${desvio!==0?'alert':''}"><div class="inner">
        <div class="row1"><span class="codigo">${it.codigo}</span><span class="qtd ${desvio!==0?'low':''}">${desvio>0?'+':''}${desvio}</span></div>
        <div class="desc">${it.descricao}</div>
        <div class="meta"><span>Sistema: ${it.sistema}</span><span>Físico: ${it.fisica}</span></div>
        <button class="btn btn-ghost btn-sm removeInvItem" data-idx="${idx}" style="margin-top:8px">Remover</button>
      </div></div>`;
    });
    html += `<div class="row-2" style="margin-top:8px">
      <button class="btn btn-outline btn-sm" id="invExportPdf">${'Exportar PDF'}</button>
      <button class="btn btn-outline btn-sm" id="invExportCsv">Exportar Excel (CSV)</button>
    </div>
    <button class="btn btn-danger btn-sm" id="invClearBtn">Limpar contagem</button>`;
  }

  html += `<div id="invScanHolder"></div>`;
  return html;
}

function findProdutoByCodigo(codigo){
  return getProdutosArr().find(p=>p.ativo!==false && p.codigo.toLowerCase()===codigo.trim().toLowerCase());
}

function attachInventarioEvents(){
  const buscarBtn = document.getElementById('invBuscarBtn');
  const codigoInput = document.getElementById('invCodigo');
  const doBusca = ()=>{
    invBusca = codigoInput.value;
    const p = findProdutoByCodigo(invBusca);
    invProdutoAtual = p || null;
    invNotFound = !p && invBusca.trim()!=='';
    renderView();
  };
  if(buscarBtn) buscarBtn.onclick = doBusca;
  if(codigoInput) codigoInput.onkeydown = (e)=>{ if(e.key==='Enter') doBusca(); };

  const scanBtn = document.getElementById('invScanBtn');
  if(scanBtn) scanBtn.onclick = ()=>{ invScanning=true; renderInvScanner(); };

  const addBtn = document.getElementById('invAddBtn');
  if(addBtn) addBtn.onclick = ()=>{
    const fisica = parseFloat(document.getElementById('invFisica').value);
    if(isNaN(fisica)){ toast('Informe a quantidade física encontrada'); return; }
    const p = invProdutoAtual;
    const existing = invItens.findIndex(it=>it.produtoId===p.id);
    const item = {produtoId:p.id, codigo:p.codigo, descricao:p.descricao, sistema:p.quantidade, fisica};
    if(existing>=0) invItens[existing] = item; else invItens.push(item);
    invProdutoAtual = null; invBusca=''; invNotFound=false;
    toast('Item adicionado à contagem'); renderView();
  };

  document.querySelectorAll('.removeInvItem').forEach(b=>{
    b.onclick = ()=>{ invItens.splice(parseInt(b.dataset.idx),1); renderView(); };
  });

  const clearBtn = document.getElementById('invClearBtn');
  if(clearBtn) clearBtn.onclick = ()=>{ if(confirm('Limpar toda a contagem de inventário atual?')){ invItens=[]; renderView(); } };

  const pdfBtn = document.getElementById('invExportPdf');
  if(pdfBtn) pdfBtn.onclick = exportInventarioPdf;
  const csvBtn = document.getElementById('invExportCsv');
  if(csvBtn) csvBtn.onclick = exportInventarioCsv;
}

function renderInvScanner(){
  const holder = document.getElementById('invScanHolder');
  if(!holder) return;
  if(!invScanning){ holder.innerHTML=''; stopScanner(); return; }
  holder.innerHTML = `<div class="overlay" id="invScanOverlay"><div class="sheet">
    <div class="sheet-head"><h2 class="section-title" style="margin:0">Escanear QR Code</h2><button class="close" id="closeInvScan">×</button></div>
    <div class="qr-box"><video id="scanVideo" autoplay playsinline muted></video><div class="qr-frame"></div></div>
    <div class="note" id="scanStatus">Aponte a câmera para o QR Code do material.</div>
    <canvas id="scanCanvas" class="hidden"></canvas>
  </div></div>`;
  document.getElementById('closeInvScan').onclick = ()=>{ invScanning=false; stopScanner(); renderInvScanner(); };
  startInvScanner();
}

async function startInvScanner(){
  try{
    scanStream = await navigator.mediaDevices.getUserMedia({ video:{ facingMode:'environment' } });
    const video = document.getElementById('scanVideo');
    video.srcObject = scanStream;
    const canvas = document.getElementById('scanCanvas');
    const ctx = canvas.getContext('2d');
    const tick = ()=>{
      if(!invScanning || !scanStream) return;
      if(video.readyState === video.HAVE_ENOUGH_DATA){
        canvas.width = video.videoWidth; canvas.height = video.videoHeight;
        ctx.drawImage(video,0,0,canvas.width,canvas.height);
        const img = ctx.getImageData(0,0,canvas.width,canvas.height);
        const code = window.jsQR ? jsQR(img.data, img.width, img.height) : null;
        if(code && code.data){
          const p = findProdutoByCodigo(code.data);
          invScanning=false; stopScanner(); renderInvScanner();
          if(p){ invProdutoAtual = p; invNotFound=false; toast('Material identificado: '+p.descricao); }
          else { invNotFound = true; toast('Código não encontrado'); }
          renderView();
          return;
        }
      }
      requestAnimationFrame(tick);
    };
    requestAnimationFrame(tick);
  }catch(e){
    const st = document.getElementById('scanStatus');
    if(st) st.textContent = 'Não foi possível acessar a câmera.';
  }
}

function exportInventarioPdf(){
  if(!window.jspdf){ toast('Biblioteca de PDF não carregou. Verifique sua conexão.'); return; }
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  doc.setFontSize(16); doc.text('ERTEL — Relatório de Desvios de Inventário', 14, 16);
  doc.setFontSize(10); doc.text('Gerado em: ' + new Date().toLocaleString('pt-BR'), 14, 23);
  let y = 34;
  doc.setFontSize(10);
  doc.text('Código', 14, y); doc.text('Descrição', 44, y); doc.text('Sistema', 118, y); doc.text('Físico', 142, y); doc.text('Desvio', 166, y);
  y += 5; doc.line(14, y, 196, y); y += 6;
  invItens.forEach(it=>{
    if(y > 280){ doc.addPage(); y = 20; }
    const desvio = it.fisica - it.sistema;
    doc.text(String(it.codigo).slice(0,14), 14, y);
    doc.text(String(it.descricao).slice(0,34), 44, y);
    doc.text(String(it.sistema), 118, y);
    doc.text(String(it.fisica), 142, y);
    doc.text((desvio>0?'+':'')+desvio, 166, y);
    y += 6;
  });
  doc.save('relatorio-desvios-ertel.pdf');
}

function exportInventarioCsv(){
  let csv = 'Código;Descrição;Quantidade Sistema;Quantidade Física;Desvio\n';
  invItens.forEach(it=>{
    const desvio = it.fisica - it.sistema;
    csv += `${it.codigo};${it.descricao.replace(/;/g,',')};${it.sistema};${it.fisica};${desvio}\n`;
  });
  const blob = new Blob(['\ufeff'+csv], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'relatorio-desvios-ertel.csv';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function attachCommonEvents(){
  document.querySelectorAll('.pwd-toggle').forEach(btn=>{
    btn.onclick = ()=>{
      const input = document.getElementById(btn.dataset.target);
      if(!input) return;
      const showing = input.type === 'text';
      input.type = showing ? 'password' : 'text';
      btn.innerHTML = showing ? ICONS.eye : ICONS.eyeOff;
    };
  });
}

bootstrap();
</script>
